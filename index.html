    <style>
      :root {
        --paper: #f7f5f1;
        --surface: #ffffff;
        --ink: #211e24;
        --ink-soft: #544e5a;
        --muted: #8b8590;
        --line: #e8e3db;
        --sindoor: #d6402b;
        --sindoor-ink: #a82e1e;
        --sindoor-wash: #fbeae6;
        --teal: #137a72;
        --teal-soft: #e2efed;
        --r-sm: 9px;
        --r: 14px;
        --r-lg: 22px;
        --shadow: 0 1px 3px rgba(33, 30, 36, 0.06), 0 10px 30px rgba(33, 30, 36, 0.1);
        --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
        --safe-t: env(safe-area-inset-top, 0px);
        --safe-b: env(safe-area-inset-bottom, 0px);
      }

      * { box-sizing: border-box; margin: 0; -webkit-tap-highlight-color: transparent; }
      html, body { height: 100%; }
      body {
        font-family: var(--font);
        font-size: 16px;
        line-height: 1.5;
        color: var(--ink);
        background: var(--paper);
        -webkit-font-smoothing: antialiased;
        overscroll-behavior-y: contain;
        -webkit-user-select: none;
        user-select: none;
      }
      h1, h2, h3 { line-height: 1.1; letter-spacing: -0.02em; font-weight: 700; }
      button { font-family: inherit; font-size: inherit; cursor: pointer; color: inherit; }
      a { color: var(--teal); }
      input, textarea {
        font-family: inherit;
        font-size: 16px; /* keeps iOS from zooming on focus */
        -webkit-user-select: text;
        user-select: text;
      }
      :focus-visible { outline: 2.5px solid var(--teal); outline-offset: 2px; }

      .app { min-height: 100%; display: flex; flex-direction: column; }

      /* ---- Header ---- */
      .header {
        position: sticky; top: 0; z-index: 20;
        padding: calc(var(--safe-t) + 10px) 16px 10px;
        background: color-mix(in srgb, var(--paper) 86%, transparent);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid var(--line);
        display: flex; align-items: center; justify-content: space-between; gap: 12px;
      }
      .brand { display: flex; align-items: center; gap: 10px; }
      .brand__deva { font-size: 1.2rem; font-weight: 700; }
      .brand__latin { font-size: 1.2rem; font-weight: 700; letter-spacing: -0.03em; }
      .brand__dot { color: var(--sindoor); }

      /* ---- Buttons ---- */
      .btn {
        display: inline-flex; align-items: center; justify-content: center; gap: 7px;
        min-height: 40px; padding: 0 16px; font-weight: 600; font-size: 0.95rem;
        border: 1px solid transparent; border-radius: var(--r-sm);
        transition: background 0.15s, border-color 0.15s, transform 0.05s;
      }
      .btn:active { transform: scale(0.98); }
      .btn--primary { background: var(--sindoor); color: #fff; }
      .btn--ghost { background: var(--surface); color: var(--ink); border-color: var(--line); }
      .btn--ghost:active { background: var(--paper); }
      .btn--text { background: transparent; color: var(--teal); min-height: 36px; padding: 0 10px; }
      .btn--danger { background: transparent; color: var(--sindoor-ink); }
      .btn--sm { min-height: 36px; padding: 0 12px; font-size: 0.88rem; }
      .btn:disabled { opacity: 0.45; }
      .btn__plus { font-size: 1.15rem; line-height: 1; margin-top: -1px; }

      /* ---- Main ---- */
      .main {
        flex: 1; width: 100%; max-width: 720px; margin: 0 auto;
        padding: 16px 16px calc(var(--safe-b) + 28px);
      }

      .preview-note {
        display: flex; gap: 10px; align-items: flex-start;
        background: var(--teal-soft);
        border: 1px solid color-mix(in srgb, var(--teal) 22%, transparent);
        border-radius: var(--r); padding: 11px 13px; margin-bottom: 16px; font-size: 0.85rem;
      }
      .preview-note b { font-weight: 700; }

      /* ---- Toolbar ---- */
      .toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
      .search { position: relative; flex: 1 1 200px; display: flex; align-items: center; }
      .search svg { position: absolute; left: 12px; color: var(--muted); pointer-events: none; }
      .search input {
        width: 100%; padding: 11px 36px 11px 36px;
        border: 1px solid var(--line); border-radius: var(--r-sm); background: var(--surface); color: var(--ink);
      }
      .search input:focus { outline: none; border-color: var(--teal); box-shadow: 0 0 0 3px var(--teal-soft); }
      .search__clear {
        position: absolute; right: 6px; border: none; background: none;
        color: var(--muted); font-size: 1.3rem; line-height: 1; padding: 4px 8px;
      }
      .toolbar__actions { display: flex; gap: 6px; }

      /* ---- Grid + card ---- */
      .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(104px, 1fr)); gap: 12px; }
      .card {
        display: flex; flex-direction: column; align-items: center; gap: 9px;
        padding: 16px 10px 14px; background: var(--surface); border: 1px solid var(--line);
        border-radius: var(--r); text-align: center;
        transition: transform 0.08s, box-shadow 0.15s, border-color 0.15s;
      }
      .card:active { transform: scale(0.97); }
      .card__name {
        font-weight: 600; font-size: 0.9rem; line-height: 1.2; color: var(--ink);
        display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
      }
      .card__sub {
        font-size: 0.76rem; color: var(--muted); max-width: 100%;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }

      /* ---- Avatar ---- */
      .avatar { border-radius: 50%; flex: none; object-fit: cover; display: inline-flex; align-items: center; justify-content: center; }
      .avatar--photo { background: var(--line); }
      .avatar--initials { color: #fff; font-weight: 700; letter-spacing: 0.01em; }

      /* ---- Empty ---- */
      .empty { text-align: center; padding: 52px 18px 40px; display: flex; flex-direction: column; align-items: center; }
      .empty h1 { font-size: 1.7rem; margin-bottom: 10px; }
      .empty p { color: var(--ink-soft); max-width: 30rem; margin-bottom: 22px; }
      .empty__hint { margin-top: 18px; font-size: 0.8rem; color: var(--muted); }
      .empty svg { margin-bottom: 24px; }

      .no-match { text-align: center; color: var(--muted); padding: 48px 16px; }

      /* ---- Sheet / modal ---- */
      .overlay {
        position: fixed; inset: 0; z-index: 50; background: rgba(33, 30, 36, 0.42);
        display: flex; align-items: flex-end; justify-content: center;
        animation: fade 0.18s ease;
      }
      @keyframes fade { from { opacity: 0; } }
      .sheet {
        width: 100%; max-width: 560px; max-height: 92vh; background: var(--surface);
        border-radius: var(--r-lg) var(--r-lg) 0 0; box-shadow: var(--shadow);
        display: flex; flex-direction: column; animation: rise 0.22s cubic-bezier(0.2, 0.8, 0.2, 1);
      }
      @keyframes rise { from { transform: translateY(14px); opacity: 0.6; } }
      .sheet__head {
        display: flex; align-items: center; justify-content: space-between; gap: 12px;
        padding: 16px 18px 12px; border-bottom: 1px solid var(--line);
      }
      .sheet__head h2 { font-size: 1.15rem; }
      .sheet__close { border: none; background: var(--paper); width: 32px; height: 32px; border-radius: 50%; color: var(--ink-soft); font-size: 1.3rem; line-height: 1; }
      .sheet__body { padding: 18px; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: calc(18px + var(--safe-b)); }

      /* ---- Form ---- */
      .form { display: flex; flex-direction: column; gap: 16px; }
      .form__photo { display: flex; align-items: center; gap: 16px; }
      .form__photo-actions { display: flex; flex-direction: column; align-items: flex-start; gap: 4px; }
      .field { display: flex; flex-direction: column; gap: 6px; }
      .field__label { font-size: 0.82rem; font-weight: 600; color: var(--ink-soft); }
      .field__req { font-weight: 400; color: var(--muted); font-size: 0.74rem; }
      .field__help, .hint { font-size: 0.76rem; color: var(--muted); }
      .field__err { font-size: 0.78rem; color: var(--sindoor-ink); }
      .row { display: flex; gap: 14px; }
      .row .field { flex: 1; }
      .field--narrow { max-width: 116px; }
      .input {
        width: 100%; padding: 11px 12px; border: 1px solid var(--line);
        border-radius: var(--r-sm); background: var(--surface); color: var(--ink);
      }
      .input:focus { outline: none; border-color: var(--teal); box-shadow: 0 0 0 3px var(--teal-soft); }
      textarea.input { resize: vertical; min-height: 70px; line-height: 1.5; }

      .segmented { display: flex; background: #efece6; border-radius: var(--r-sm); padding: 3px; gap: 2px; }
      .segmented button {
        flex: 1; min-height: 34px; border: none; background: transparent; border-radius: 6px;
        font-size: 0.85rem; color: var(--ink-soft); font-weight: 500;
      }
      .segmented button.on { background: var(--surface); color: var(--ink); font-weight: 600; box-shadow: 0 1px 2px rgba(0, 0, 0, 0.08); }

      .social-row { display: flex; gap: 8px; margin-bottom: 8px; }
      .icon-btn {
        flex: none; width: 40px; height: 40px; border: 1px solid var(--line);
        background: var(--surface); border-radius: var(--r-sm); color: var(--ink-soft); font-size: 1.2rem;
      }

      .form__actions, .detail__actions { display: flex; align-items: center; gap: 10px; padding-top: 4px; }
      .spacer { flex: 1; }

      /* ---- Detail ---- */
      .detail { display: flex; flex-direction: column; gap: 16px; }
      .detail__head { display: flex; align-items: center; gap: 15px; }
      .detail__name { font-size: 1.35rem; }
      .detail__nick { color: var(--muted); font-size: 0.9rem; margin-top: 2px; }
      .chips { display: flex; flex-wrap: wrap; gap: 6px; }
      .chip { font-size: 0.76rem; color: var(--ink-soft); background: var(--paper); border: 1px solid var(--line); padding: 3px 10px; border-radius: 999px; }
      .dl { display: flex; flex-direction: column; gap: 12px; }
      .dl__row { display: grid; grid-template-columns: 70px 1fr; gap: 10px; }
      .dl__row dt { font-size: 0.82rem; color: var(--muted); }
      .dl__row dd { font-size: 0.92rem; }
      .dl__links { display: flex; flex-direction: column; gap: 4px; }
      .dl__links a, .dl__row a { text-decoration: none; word-break: break-all; }
      .notes { white-space: pre-wrap; line-height: 1.5; }

      /* ---- Footer ---- */
      .footer { border-top: 1px solid var(--line); padding: 14px 16px calc(14px + var(--safe-b)); }
      .footer__inner { max-width: 720px; margin: 0 auto; display: flex; justify-content: space-between; gap: 10px; flex-wrap: wrap; font-size: 0.78rem; color: var(--muted); }
      .tag { font-weight: 700; font-size: 0.68rem; letter-spacing: 0.04em; color: var(--teal); background: var(--teal-soft); padding: 2px 8px; border-radius: 999px; }

      /* ---- Toast ---- */
      .toast {
        position: fixed; left: 50%; bottom: calc(22px + var(--safe-b)); transform: translateX(-50%);
        background: var(--ink); color: #fff; padding: 11px 18px; border-radius: 999px;
        font-size: 0.88rem; z-index: 80; box-shadow: var(--shadow); animation: fade 0.2s ease; max-width: 90%;
      }

      @media (max-width: 470px) {
        .row { flex-direction: column; gap: 16px; }
        .field--narrow { max-width: none; }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div class="brand">
          <svg width="30" height="30" viewBox="0 0 32 32" aria-hidden="true">
            <rect width="32" height="32" rx="7" fill="#211e24" />
            <line x1="10.5" y1="21.5" x2="21.5" y2="10.5" stroke="#137a72" stroke-width="2.4" stroke-linecap="round" />
            <circle cx="9.5" cy="22.5" r="4.2" fill="#d6402b" />
            <circle cx="22.5" cy="9.5" r="4.2" fill="#f7f5f1" />
          </svg>
          <span class="brand__deva">नाता</span>
          <span class="brand__latin"><span class="brand__dot">·</span> Naata</span>
        </div>
        <button class="btn btn--primary" id="addBtn">
          <span class="btn__plus">+</span> Add
        </button>
      </header>

      <main class="main" id="main"></main>

      <footer class="footer">
        <div class="footer__inner">
          <span><span class="tag">v0.3</span> Naata — family, mapped</span>
          <span id="footMeta">Local-first · Khas/Parbatiya kinship</span>
        </div>
      </footer>
    </div>

    <div id="modalRoot"></div>

    <script>
      "use strict";

      // ======================================================
      // Storage  (localStorage, with graceful in-memory fallback
      // so the in-chat preview still runs even when storage is
      // sandboxed — real saving kicks in once deployed.)
      // ======================================================
      var KEY = "naata.v1";
      var persistent = (function () {
        try {
          localStorage.setItem("naata.__t", "1");
          localStorage.removeItem("naata.__t");
          return true;
        } catch (e) {
          return false;
        }
      })();

      var state = { people: [], parentChild: [], spouses: [] };

      function load() {
        if (!persistent) return;
        try {
          var raw = localStorage.getItem(KEY);
          if (raw) {
            var d = JSON.parse(raw);
            state.people = d.people || [];
            state.parentChild = d.parentChild || [];
            state.spouses = d.spouses || [];
          }
        } catch (e) {
          /* keep defaults */
        }
      }

      function save() {
        if (!persistent) return;
        try {
          localStorage.setItem(KEY, JSON.stringify(state));
        } catch (e) {
          if (e && (e.name === "QuotaExceededError" || e.code === 22)) {
            toast("Storage is full — remove a photo or export a backup.");
          }
        }
      }

      // ======================================================
      // Utils
      // ======================================================
      function uid() {
        if (crypto && crypto.randomUUID) return crypto.randomUUID();
        return "id-" + Date.now() + "-" + Math.random().toString(36).slice(2);
      }

      function el(tag, attrs) {
        var n = document.createElement(tag);
        attrs = attrs || {};
        for (var k in attrs) {
          var v = attrs[k];
          if (v == null || v === false) continue;
          if (k === "class") n.className = v;
          else if (k === "html") n.innerHTML = v;
          else if (k === "text") n.textContent = v;
          else if (k.slice(0, 2) === "on" && typeof v === "function")
            n.addEventListener(k.slice(2).toLowerCase(), v);
          else n.setAttribute(k, v === true ? "" : v);
        }
        for (var i = 2; i < arguments.length; i++) {
          var kid = arguments[i];
          if (kid == null || kid === false) continue;
          if (Array.isArray(kid)) {
            kid.forEach(function (c) { if (c != null && c !== false) n.appendChild(asNode(c)); });
          } else n.appendChild(asNode(kid));
        }
        return n;
      }
      function asNode(c) { return typeof c === "object" ? c : document.createTextNode(String(c)); }

      var AV_COLORS = ["#137a72", "#d6402b", "#7a5b13", "#3f5fa8", "#8a3fa8", "#2f8a4f", "#a83f6f"];
      function initials(name) {
        var p = (name || "").trim().split(/\s+/).filter(Boolean);
        if (!p.length) return "?";
        if (p.length === 1) return p[0].slice(0, 2).toUpperCase();
        return (p[0][0] + p[p.length - 1][0]).toUpperCase();
      }
      function colorFor(name) {
        var h = 0;
        for (var i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
        return AV_COLORS[h % AV_COLORS.length];
      }
      function avatar(person, size) {
        if (person.photo) {
          return el("img", { class: "avatar avatar--photo", src: person.photo, alt: "", draggable: "false",
            style: "width:" + size + "px;height:" + size + "px" });
        }
        return el("div", { class: "avatar avatar--initials", "aria-hidden": "true",
          style: "width:" + size + "px;height:" + size + "px;font-size:" + size * 0.38 + "px;background:" + colorFor(person.name || "?") },
          initials(person.name || "?"));
      }
      function ordinal(n) {
        var s = ["th", "st", "nd", "rd"], v = n % 100;
        return n + (s[(v - 20) % 10] || s[v] || s[0]);
      }

      // Downscale a chosen photo to a small JPEG data URL.
      function fileToAvatar(file) {
        return new Promise(function (resolve, reject) {
          if (!file.type || file.type.indexOf("image/") !== 0) { reject(new Error("Please choose an image.")); return; }
          var reader = new FileReader();
          reader.onerror = function () { reject(new Error("Couldn't read that image.")); };
          reader.onload = function () {
            var img = new Image();
            img.onerror = function () { reject(new Error("Couldn't open that image.")); };
            img.onload = function () {
              var MAX = 320;
              var scale = Math.min(1, MAX / Math.max(img.width, img.height));
              var w = Math.round(img.width * scale), h = Math.round(img.height * scale);
              var c = document.createElement("canvas");
              c.width = w; c.height = h;
              var ctx = c.getContext("2d");
              if (!ctx) { resolve(reader.result); return; }
              ctx.drawImage(img, 0, 0, w, h);
              resolve(c.toDataURL("image/jpeg", 0.72));
            };
            img.src = reader.result;
          };
          reader.readAsDataURL(file);
        });
      }

      var toastTimer;
      function toast(msg) {
        var old = document.querySelector(".toast");
        if (old) old.remove();
        var t = el("div", { class: "toast" }, msg);
        document.body.appendChild(t);
        clearTimeout(toastTimer);
        toastTimer = setTimeout(function () { t.remove(); }, 3200);
      }

      // ======================================================
      // Data operations
      // ======================================================
      function addPerson(draft) {
        var now = Date.now();
        var p = Object.assign({}, draft, { id: uid(), createdAt: now, updatedAt: now });
        state.people.push(p);
        save();
        return p;
      }
      function updatePerson(id, draft) {
        var i = state.people.findIndex(function (p) { return p.id === id; });
        if (i < 0) return null;
        state.people[i] = Object.assign({}, state.people[i], draft, { updatedAt: Date.now() });
        save();
        return state.people[i];
      }
      function removePerson(id) {
        state.people = state.people.filter(function (p) { return p.id !== id; });
        state.parentChild = state.parentChild.filter(function (e) { return e.parentId !== id && e.childId !== id; });
        state.spouses = state.spouses.filter(function (e) { return e.aId !== id && e.bId !== id; });
        save();
      }

      // ======================================================
      // Backup
      // ======================================================
      function exportBackup() {
        var payload = { app: "naata", version: 1, exportedAt: new Date().toISOString(),
          people: state.people, parentChild: state.parentChild, spouses: state.spouses };
        var blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
        var url = URL.createObjectURL(blob);
        var a = el("a", { href: url, download: "naata-backup-" + new Date().toISOString().slice(0, 10) + ".json" });
        document.body.appendChild(a); a.click(); a.remove();
        URL.revokeObjectURL(url);
        toast("Backup downloaded.");
      }
      function importBackup(file) {
        var reader = new FileReader();
        reader.onload = function () {
          var d;
          try { d = JSON.parse(reader.result); } catch (e) { toast("That file isn't valid JSON."); return; }
          if (d.app !== "naata" || !Array.isArray(d.people)) { toast("That isn't a Naata backup file."); return; }
          if (!confirm("Restoring replaces everyone currently in Naata on this device. Continue?")) return;
          state.people = d.people || [];
          state.parentChild = d.parentChild || [];
          state.spouses = d.spouses || [];
          save();
          renderMain();
          toast("Restored " + state.people.length + (state.people.length === 1 ? " person." : " people."));
        };
        reader.readAsText(file);
      }

      // ======================================================
      // Modals
      // ======================================================
      var modalRoot = document.getElementById("modalRoot");
      function closeModal() { modalRoot.innerHTML = ""; document.body.style.overflow = ""; }
      function openSheet(title, bodyNode) {
        var sheet = el("div", { class: "sheet", role: "dialog", "aria-modal": "true", "aria-label": title },
          el("div", { class: "sheet__head" },
            el("h2", {}, title),
            el("button", { class: "sheet__close", "aria-label": "Close", onclick: closeModal }, "×")
          ),
          el("div", { class: "sheet__body" }, bodyNode)
        );
        var overlay = el("div", { class: "overlay", onclick: function (e) { if (e.target === overlay) closeModal(); } }, sheet);
        modalRoot.innerHTML = "";
        modalRoot.appendChild(overlay);
        document.body.style.overflow = "hidden";
      }

      var GENDERS = [["male", "Male"], ["female", "Female"], ["other", "Other"], ["unknown", "Not set"]];

      function openForm(existing) {
        var photo = existing ? existing.photo : undefined;
        var gender = existing ? existing.gender : "unknown";
        var socials = existing && existing.socials ? existing.socials.slice() : [];

        // Photo block
        var avatarWrap = el("div", {});
        function paintAvatar() {
          avatarWrap.innerHTML = "";
          avatarWrap.appendChild(avatar({ name: nameInput ? nameInput.value || "?" : "?", photo: photo }, 78));
        }
        var fileInput = el("input", { type: "file", accept: "image/*", hidden: true,
          onchange: function (e) {
            var f = e.target.files && e.target.files[0];
            e.target.value = "";
            if (!f) return;
            fileToAvatar(f).then(function (d) { photo = d; paintAvatar(); })
              .catch(function (err) { toast(err.message || "Couldn't add photo."); });
          } });
        var removeBtn = el("button", { type: "button", class: "btn btn--text btn--sm",
          onclick: function () { photo = undefined; paintAvatar(); } }, "Remove");
        var pickLabel = el("label", { class: "btn btn--ghost btn--sm" }, photo ? "Change photo" : "Add photo", fileInput);

        var nameInput = el("input", { class: "input", value: existing ? existing.name : "", placeholder: "Full name" });
        var nameErr = el("div", { class: "field__err", style: "display:none" }, "A name is needed to save.");
        var nickInput = el("input", { class: "input", value: existing && existing.nickname ? existing.nickname : "", placeholder: "What people actually call them" });
        var orderInput = el("input", { class: "input", type: "number", min: "1",
          value: existing && existing.birthOrder != null ? String(existing.birthOrder) : "", placeholder: "—" });
        var phoneInput = el("input", { class: "input", inputmode: "tel", value: existing && existing.phone ? existing.phone : "", placeholder: "Optional" });
        var notesInput = el("textarea", { class: "input", rows: "3",
          placeholder: "Anything that helps you place them — where they live, how you met, a memory." }, existing && existing.notes ? existing.notes : "");

        // Gender segmented
        var segBtns = GENDERS.map(function (g) {
          return el("button", { type: "button", class: "" + (gender === g[0] ? "on" : ""),
            onclick: function () { gender = g[0]; segBtns.forEach(function (b, i) { b.className = GENDERS[i][0] === gender ? "on" : ""; }); } }, g[1]);
        });
        var segmented = el("div", { class: "segmented", role: "group", "aria-label": "Gender" }, segBtns);

        // Socials
        var socialsWrap = el("div", {});
        function paintSocials() {
          socialsWrap.innerHTML = "";
          socials.forEach(function (s, idx) {
            socialsWrap.appendChild(el("div", { class: "social-row" },
              el("input", { class: "input", style: "max-width:116px", value: s.label, placeholder: "Label",
                oninput: function (e) { socials[idx].label = e.target.value; } }),
              el("input", { class: "input", inputmode: "url", value: s.url, placeholder: "https://…",
                oninput: function (e) { socials[idx].url = e.target.value; } }),
              el("button", { type: "button", class: "icon-btn", "aria-label": "Remove link",
                onclick: function () { socials.splice(idx, 1); paintSocials(); } }, "×")
            ));
          });
          socialsWrap.appendChild(el("button", { type: "button", class: "btn btn--text btn--sm",
            onclick: function () { socials.push({ label: "", url: "" }); paintSocials(); } }, "+ Add link"));
        }
        paintSocials();
        nameInput.addEventListener("input", function () { if (nameInput.value.trim()) nameErr.style.display = "none"; });
        paintAvatar();

        function submit() {
          var name = nameInput.value.trim();
          if (!name) { nameErr.style.display = "block"; nameInput.focus(); return; }
          var cleanSocials = socials.map(function (s) { return { label: (s.label || "").trim(), url: (s.url || "").trim() }; })
            .filter(function (s) { return s.url; });
          var ord = orderInput.value.trim() === "" ? undefined : Number(orderInput.value);
          var draft = {
            name: name,
            nickname: nickInput.value.trim() || undefined,
            gender: gender,
            birthOrder: (ord != null && isFinite(ord)) ? ord : undefined,
            photo: photo,
            phone: phoneInput.value.trim() || undefined,
            socials: cleanSocials.length ? cleanSocials : undefined,
            notes: notesInput.value.trim() || undefined
          };
          if (existing) { var u = updatePerson(existing.id, draft); renderMain(); openDetail(u); }
          else { addPerson(draft); renderMain(); closeModal(); }
        }

        var actions = el("div", { class: "form__actions" },
          existing ? el("button", { type: "button", class: "btn btn--danger", onclick: function () { confirmDelete(existing); } }, "Delete") : null,
          el("span", { class: "spacer" }),
          el("button", { type: "button", class: "btn btn--ghost", onclick: existing ? function () { openDetail(existing); } : closeModal }, "Cancel"),
          el("button", { type: "button", class: "btn btn--primary", onclick: submit }, existing ? "Save changes" : "Add person")
        );

        var form = el("div", { class: "form" },
          el("div", { class: "form__photo" }, avatarWrap,
            el("div", { class: "form__photo-actions" }, pickLabel, photo ? removeBtn : null)),
          field("Name", nameInput, nameErr, true),
          field("Called / nickname", nickInput),
          el("div", { class: "row" },
            el("div", { class: "field" }, labelEl("Gender"), segmented, el("div", { class: "field__help" }, "Used later to pick the right kinship term.")),
            el("label", { class: "field field--narrow" }, labelEl("Birth order"), orderInput, el("div", { class: "field__help" }, "1 = eldest sibling."))
          ),
          field("Phone", phoneInput),
          el("div", { class: "field" }, labelEl("Social links"), socialsWrap),
          field("Notes", notesInput)
        );

        // re-render photo actions when photo toggles (simple approach: rebuild on each paint)
        var origPaint = paintAvatar;
        paintAvatar = function () {
          origPaint();
          var actionsBox = pickLabel.parentNode;
          if (actionsBox) {
            pickLabel.firstChild.nodeValue = photo ? "Change photo" : "Add photo";
            var existingRemove = actionsBox.querySelector(".btn--text");
            if (photo && !existingRemove) actionsBox.appendChild(removeBtn);
            if (!photo && existingRemove) existingRemove.remove();
          }
        };

        openSheet(existing ? "Edit person" : "Add person", el("div", {}, form, actions));
        setTimeout(function () { nameInput.focus(); }, 60);
      }

      function labelEl(text, required) {
        return el("span", { class: "field__label" }, text, required ? el("span", { class: "field__req" }, " required") : null);
      }
      function field(label, input, errNode, required) {
        return el("label", { class: "field" }, labelEl(label, required), input, errNode || null);
      }

      function openDetail(person) {
        person = state.people.find(function (p) { return p.id === person.id; }) || person;
        var hasMeta = person.gender !== "unknown" || person.birthOrder != null || person.dob;
        var rows = [];
        if (person.phone) rows.push(el("div", { class: "dl__row" }, el("dt", {}, "Phone"), el("dd", {}, el("a", { href: "tel:" + person.phone }, person.phone))));
        if (person.socials && person.socials.length) {
          rows.push(el("div", { class: "dl__row" }, el("dt", {}, "Links"),
            el("dd", { class: "dl__links" }, person.socials.map(function (s) {
              return el("a", { href: s.url, target: "_blank", rel: "noopener noreferrer" }, s.label || s.url);
            }))));
        }
        if (person.notes) rows.push(el("div", { class: "dl__row" }, el("dt", {}, "Notes"), el("dd", { class: "notes" }, person.notes)));

        var body = el("div", { class: "detail" },
          el("div", { class: "detail__head" }, avatar(person, 86),
            el("div", {}, el("h3", { class: "detail__name" }, person.name),
              person.nickname ? el("p", { class: "detail__nick" }, "“" + person.nickname + "”") : null)),
          hasMeta ? el("div", { class: "chips" },
            person.gender !== "unknown" ? el("span", { class: "chip" }, ({ male: "Male", female: "Female", other: "Other" })[person.gender]) : null,
            person.birthOrder != null ? el("span", { class: "chip" }, ordinal(person.birthOrder) + " born") : null,
            person.dob ? el("span", { class: "chip" }, person.dob) : null) : null,
          rows.length ? el("dl", { class: "dl" }, rows) : null,
          el("div", { class: "detail__actions" },
            el("button", { class: "btn btn--danger", onclick: function () { confirmDelete(person); } }, "Delete"),
            el("span", { class: "spacer" }),
            el("button", { class: "btn btn--primary", onclick: function () { openForm(person); } }, "Edit"))
        );
        openSheet(person.name, body);
      }

      function confirmDelete(person) {
        if (!confirm("Remove " + person.name + " from Naata? This can't be undone.")) return;
        removePerson(person.id);
        closeModal();
        renderMain();
      }

      // ======================================================
      // Main render
      // ======================================================
      var query = "";
      var main = document.getElementById("main");
      var footMeta = document.getElementById("footMeta");

      function lineageArt() {
        var ns = "http://www.w3.org/2000/svg";
        var svg = document.createElementNS(ns, "svg");
        svg.setAttribute("width", "164"); svg.setAttribute("height", "112"); svg.setAttribute("viewBox", "0 0 168 116");
        var line = document.createElementNS(ns, "path");
        line.setAttribute("d", "M84 33v15M52 66V57h64v9");
        line.setAttribute("stroke", "var(--line)"); line.setAttribute("stroke-width", "2");
        line.setAttribute("fill", "none"); line.setAttribute("stroke-linecap", "round"); line.setAttribute("stroke-linejoin", "round");
        svg.appendChild(line);
        [[84, 20, "var(--teal)", "var(--surface)"], [52, 80, "var(--muted)", "var(--surface)"], [116, 80, "var(--sindoor)", "var(--sindoor-wash)"]].forEach(function (n) {
          var g = document.createElementNS(ns, "g");
          var c = document.createElementNS(ns, "circle");
          c.setAttribute("cx", n[0]); c.setAttribute("cy", n[1]); c.setAttribute("r", "13"); c.setAttribute("fill", n[3]); c.setAttribute("stroke", n[2]); c.setAttribute("stroke-width", "2");
          var head = document.createElementNS(ns, "circle");
          head.setAttribute("cx", n[0]); head.setAttribute("cy", n[1] - 4); head.setAttribute("r", "3.6"); head.setAttribute("fill", n[2]);
          var sh = document.createElementNS(ns, "path");
          sh.setAttribute("d", "M" + (n[0] - 7.5) + " " + (n[1] + 8.5) + " a 7.5 6.5 0 0 1 15 0"); sh.setAttribute("fill", n[2]);
          g.appendChild(c); g.appendChild(head); g.appendChild(sh); svg.appendChild(g);
        });
        return svg;
      }

      function renderEmpty() {
        return el("div", { class: "empty" }, lineageArt(),
          el("h1", {}, "No one here yet"),
          el("p", {}, "Add your family one person at a time. Once a few are in, Naata works out exactly how each one is related to you — and what to call them."),
          el("button", { class: "btn btn--primary", onclick: function () { openForm(); } }, "Add your first person"),
          el("p", { class: "empty__hint" }, "Everything stays on this device. Nothing is uploaded.")
        );
      }

      function filteredPeople() {
        var q = query.trim().toLowerCase();
        var list = state.people.slice().sort(function (a, b) { return a.name.localeCompare(b.name); });
        if (!q) return list;
        return list.filter(function (p) {
          return p.name.toLowerCase().indexOf(q) >= 0 ||
            (p.nickname && p.nickname.toLowerCase().indexOf(q) >= 0) ||
            (p.notes && p.notes.toLowerCase().indexOf(q) >= 0);
        });
      }

      var gridBox; // re-rendered on search without rebuilding the input
      function renderGrid() {
        var list = filteredPeople();
        gridBox.innerHTML = "";
        if (!list.length) { gridBox.appendChild(el("div", { class: "no-match" }, "No one matches “" + query + "”.")); return; }
        var grid = el("div", { class: "grid" });
        list.forEach(function (p) {
          grid.appendChild(el("button", { class: "card", onclick: function () { openDetail(p); } },
            avatar(p, 60),
            el("span", { class: "card__name" }, p.name),
            p.nickname ? el("span", { class: "card__sub" }, "“" + p.nickname + "”") : null));
        });
        gridBox.appendChild(grid);
      }

      function renderMain() {
        main.innerHTML = "";
        if (!persistent) {
          main.appendChild(el("div", { class: "preview-note" },
            el("span", {}, el("b", {}, "Preview mode. "),
              "Changes won't save in this chat window — that's a sandbox limit. Once Naata is on your phone, everything saves automatically.")));
        }

        var total = state.people.length;
        footMeta.textContent = total ? total + (total === 1 ? " person" : " people") + " · on this device" : "Local-first · Khas/Parbatiya kinship";

        if (!total) { main.appendChild(renderEmpty()); return; }

        var searchInput = el("input", { value: query, placeholder: "Search " + total + (total === 1 ? " person…" : " people…"), "aria-label": "Search family",
          oninput: function (e) { query = e.target.value; renderGrid(); toggleClear(); } });
        var clearBtn = el("button", { class: "search__clear", "aria-label": "Clear search", style: query ? "" : "display:none",
          onclick: function () { query = ""; searchInput.value = ""; renderGrid(); toggleClear(); searchInput.focus(); } }, "×");
        function toggleClear() { clearBtn.style.display = query ? "" : "none"; }

        var searchWrap = el("div", { class: "search" },
          svgSearch(), searchInput, clearBtn);

        var fileInput = el("input", { type: "file", accept: "application/json,.json", hidden: true,
          onchange: function (e) { var f = e.target.files && e.target.files[0]; e.target.value = ""; if (f) importBackup(f); } });
        var toolbar = el("div", { class: "toolbar" }, searchWrap,
          el("div", { class: "toolbar__actions" },
            el("button", { class: "btn btn--ghost btn--sm", onclick: exportBackup }, "Export"),
            el("button", { class: "btn btn--ghost btn--sm", onclick: function () { fileInput.click(); } }, "Import"),
            fileInput));

        gridBox = el("div", {});
        main.appendChild(toolbar);
        main.appendChild(gridBox);
        renderGrid();
      }

      function svgSearch() {
        var ns = "http://www.w3.org/2000/svg";
        var s = document.createElementNS(ns, "svg");
        s.setAttribute("width", "16"); s.setAttribute("height", "16"); s.setAttribute("viewBox", "0 0 16 16"); s.setAttribute("fill", "none");
        var c = document.createElementNS(ns, "circle");
        c.setAttribute("cx", "7"); c.setAttribute("cy", "7"); c.setAttribute("r", "4.5"); c.setAttribute("stroke", "currentColor"); c.setAttribute("stroke-width", "1.6");
        var l = document.createElementNS(ns, "path");
        l.setAttribute("d", "M10.5 10.5L14 14"); l.setAttribute("stroke", "currentColor"); l.setAttribute("stroke-width", "1.6"); l.setAttribute("stroke-linecap", "round");
        s.appendChild(c); s.appendChild(l);
        return s;
      }

      // ======================================================
      // Boot
      // ======================================================
      document.getElementById("addBtn").addEventListener("click", function () { openForm(); });
      document.addEventListener("keydown", function (e) { if (e.key === "Escape") closeModal(); });
      load();
      renderMain();
    </script>
  </body>
</html>
