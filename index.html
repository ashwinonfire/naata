    <style>
      :root {
        --paper:#f7f5f1; --surface:#ffffff; --ink:#211e24; --ink-soft:#544e5a; --muted:#8b8590;
        --line:#e8e3db; --sindoor:#d6402b; --sindoor-ink:#a82e1e; --sindoor-wash:#fbeae6;
        --teal:#137a72; --teal-soft:#e2efed; --r-sm:9px; --r:14px; --r-lg:22px;
        --shadow:0 1px 3px rgba(33,30,36,.06),0 10px 30px rgba(33,30,36,.1);
        --shadow-sm:0 1px 2px rgba(33,30,36,.05);
        --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",sans-serif;
        --safe-t:env(safe-area-inset-top,0px); --safe-b:env(safe-area-inset-bottom,0px);
      }
      *{box-sizing:border-box;margin:0;-webkit-tap-highlight-color:transparent}
      html,body{height:100%}
      body{font-family:var(--font);font-size:16px;line-height:1.5;color:var(--ink);background:var(--paper);
        -webkit-font-smoothing:antialiased;overscroll-behavior:none;-webkit-user-select:none;user-select:none}
      h1,h2,h3{line-height:1.1;letter-spacing:-.02em;font-weight:700}
      button{font-family:inherit;font-size:inherit;cursor:pointer;color:inherit}
      a{color:var(--teal)}
      input,textarea{font-family:inherit;font-size:16px;-webkit-user-select:text;user-select:text}
      :focus-visible{outline:2.5px solid var(--teal);outline-offset:2px}
      .app{height:100%;display:flex;flex-direction:column}

      .header{position:sticky;top:0;z-index:20;padding:calc(var(--safe-t) + 10px) 16px 10px;
        background:color-mix(in srgb,var(--paper) 86%,transparent);backdrop-filter:blur(10px);
        border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:12px}
      .brand{display:flex;align-items:center;gap:10px}
      .brand__deva{font-size:1.2rem;font-weight:700}
      .brand__latin{font-size:1.2rem;font-weight:700;letter-spacing:-.03em}
      .brand__dot{color:var(--sindoor)}
      .header__tools{display:flex;gap:6px;align-items:center}

      .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;min-height:40px;padding:0 16px;
        font-weight:600;font-size:.95rem;border:1px solid transparent;border-radius:var(--r-sm);
        transition:background .15s,border-color .15s,transform .05s}
      .btn:active{transform:scale(.98)}
      .btn--primary{background:var(--sindoor);color:#fff}
      .btn--ghost{background:var(--surface);color:var(--ink);border-color:var(--line)}
      .btn--ghost:active{background:var(--paper)}
      .btn--text{background:transparent;color:var(--teal);min-height:36px;padding:0 10px}
      .btn--danger{background:transparent;color:var(--sindoor-ink)}
      .btn--sm{min-height:36px;padding:0 12px;font-size:.88rem}
      .btn:disabled{opacity:.45}

      .stage{flex:1;position:relative;overflow:auto;-webkit-overflow-scrolling:touch}
      .preview-note{position:absolute;top:10px;left:10px;right:10px;z-index:5;display:flex;gap:10px;
        background:var(--teal-soft);border:1px solid color-mix(in srgb,var(--teal) 22%,transparent);
        border-radius:var(--r);padding:10px 12px;font-size:.82rem;pointer-events:none}
      .preview-note b{font-weight:700}

      .empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px}
      .bigplus{width:84px;height:84px;border-radius:50%;background:var(--sindoor);color:#fff;border:none;
        font-size:2.6rem;line-height:1;box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center}
      .bigplus:active{transform:scale(.95)}
      .empty h1{font-size:1.5rem;margin:22px 0 8px}
      .empty p{color:var(--ink-soft);max-width:26rem}
      .empty__hint{margin-top:16px;font-size:.8rem;color:var(--muted)}

      .canvas{position:relative}
      .canvas svg.links{position:absolute;top:0;left:0;pointer-events:none}
      .node{position:absolute;width:128px;display:flex;flex-direction:column;align-items:center}
      .tcard{width:128px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);
        padding:12px 8px 11px;display:flex;flex-direction:column;align-items:center;gap:7px;text-align:center;
        box-shadow:var(--shadow-sm);transition:transform .08s,border-color .15s,box-shadow .15s}
      .tcard:active{transform:scale(.97)}
      .tcard.is-me{border-color:var(--sindoor);box-shadow:0 0 0 3px var(--sindoor-wash)}
      .tcard__name{font-weight:600;font-size:.86rem;line-height:1.18;color:var(--ink);
        display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
      .tcard__sub{font-size:.72rem;color:var(--muted);max-width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
      .me-badge{font-size:.62rem;font-weight:700;letter-spacing:.05em;color:var(--sindoor);background:var(--sindoor-wash);padding:1px 7px;border-radius:999px}

      .plus{position:absolute;width:24px;height:24px;border-radius:50%;background:var(--sindoor);color:#fff;
        border:2px solid var(--paper);font-size:1rem;line-height:1;display:flex;align-items:center;justify-content:center;z-index:3;box-shadow:0 1px 3px rgba(0,0,0,.2)}
      .plus:active{transform:scale(.9)}
      .plus--right{top:34px;right:-12px}
      .plus--bottom{bottom:-12px;left:calc(50% - 12px)}

      .avatar{border-radius:50%;flex:none;object-fit:cover;display:inline-flex;align-items:center;justify-content:center}
      .avatar--photo{background:var(--line)}
      .avatar--initials{color:#fff;font-weight:700}

      .overlay{position:fixed;inset:0;z-index:50;background:rgba(33,30,36,.42);display:flex;align-items:flex-end;justify-content:center;animation:fade .18s ease}
      @keyframes fade{from{opacity:0}}
      .sheet{width:100%;max-width:560px;max-height:92vh;background:var(--surface);border-radius:var(--r-lg) var(--r-lg) 0 0;
        box-shadow:var(--shadow);display:flex;flex-direction:column;animation:rise .22s cubic-bezier(.2,.8,.2,1)}
      @keyframes rise{from{transform:translateY(14px);opacity:.6}}
      .sheet__head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px 18px 12px;border-bottom:1px solid var(--line)}
      .sheet__head h2{font-size:1.12rem}
      .sheet__close{border:none;background:var(--paper);width:32px;height:32px;border-radius:50%;color:var(--ink-soft);font-size:1.3rem;line-height:1}
      .sheet__body{padding:18px;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(18px + var(--safe-b))}
      .sheet__ctx{font-size:.85rem;color:var(--ink-soft);background:var(--paper);border-radius:var(--r-sm);padding:9px 12px;margin-bottom:16px}

      .form{display:flex;flex-direction:column;gap:16px}
      .form__photo{display:flex;align-items:center;gap:16px}
      .form__photo-actions{display:flex;flex-direction:column;align-items:flex-start;gap:4px}
      .field{display:flex;flex-direction:column;gap:6px}
      .field__label{font-size:.82rem;font-weight:600;color:var(--ink-soft)}
      .field__req{font-weight:400;color:var(--muted);font-size:.74rem}
      .field__help{font-size:.76rem;color:var(--muted)}
      .field__err{font-size:.78rem;color:var(--sindoor-ink)}
      .field--hot .field__label{color:var(--sindoor-ink)}
      .row{display:flex;gap:14px}.row .field{flex:1}.field--narrow{max-width:120px}
      .input{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:var(--r-sm);background:var(--surface);color:var(--ink)}
      .input:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-soft)}
      textarea.input{resize:vertical;min-height:70px;line-height:1.5}
      .segmented{display:flex;background:#efece6;border-radius:var(--r-sm);padding:3px;gap:2px}
      .segmented button{flex:1;min-height:34px;border:none;background:transparent;border-radius:6px;font-size:.85rem;color:var(--ink-soft);font-weight:500}
      .segmented button.on{background:var(--surface);color:var(--ink);font-weight:600;box-shadow:0 1px 2px rgba(0,0,0,.08)}
      .social-row{display:flex;gap:8px;margin-bottom:8px}
      .icon-btn{flex:none;width:40px;height:40px;border:1px solid var(--line);background:var(--surface);border-radius:var(--r-sm);color:var(--ink-soft);font-size:1.2rem}
      .form__actions,.detail__actions{display:flex;align-items:center;gap:10px;padding-top:4px}
      .spacer{flex:1}

      .choice{display:flex;flex-direction:column;gap:10px}
      .choice button{display:flex;align-items:center;gap:12px;text-align:left;padding:14px;border:1px solid var(--line);
        background:var(--surface);border-radius:var(--r);min-height:auto}
      .choice button:active{background:var(--paper)}
      .choice__ic{width:36px;height:36px;flex:none;border-radius:9px;background:var(--teal-soft);color:var(--teal);
        display:flex;align-items:center;justify-content:center;font-size:1.15rem;font-weight:700}
      .choice__t{font-weight:600}.choice__d{font-size:.8rem;color:var(--muted)}

      .detail{display:flex;flex-direction:column;gap:16px}
      .detail__head{display:flex;align-items:center;gap:15px}
      .detail__name{font-size:1.35rem}.detail__nick{color:var(--muted);font-size:.9rem;margin-top:2px}
      .chips{display:flex;flex-wrap:wrap;gap:6px}
      .chip{font-size:.76rem;color:var(--ink-soft);background:var(--paper);border:1px solid var(--line);padding:3px 10px;border-radius:999px}
      .chip--act{cursor:pointer;border-color:color-mix(in srgb,var(--sindoor) 40%,var(--line));color:var(--sindoor-ink)}
      .dl{display:flex;flex-direction:column;gap:12px}
      .dl__row{display:grid;grid-template-columns:70px 1fr;gap:10px}
      .dl__row dt{font-size:.82rem;color:var(--muted)}.dl__row dd{font-size:.92rem}
      .dl__links{display:flex;flex-direction:column;gap:4px}.dl__links a,.dl__row a{text-decoration:none;word-break:break-all}
      .notes{white-space:pre-wrap;line-height:1.5}

      .toast{position:fixed;left:50%;bottom:calc(22px + var(--safe-b));transform:translateX(-50%);background:var(--ink);
        color:#fff;padding:11px 18px;border-radius:999px;font-size:.88rem;z-index:80;box-shadow:var(--shadow);animation:fade .2s ease;max-width:90%;text-align:center}
      @media (max-width:470px){.row{flex-direction:column;gap:16px}.field--narrow{max-width:none}}
    </style>
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div class="brand">
          <svg width="30" height="30" viewBox="0 0 32 32" aria-hidden="true">
            <rect width="32" height="32" rx="7" fill="#211e24"/>
            <line x1="10.5" y1="21.5" x2="21.5" y2="10.5" stroke="#137a72" stroke-width="2.4" stroke-linecap="round"/>
            <circle cx="9.5" cy="22.5" r="4.2" fill="#d6402b"/><circle cx="22.5" cy="9.5" r="4.2" fill="#f7f5f1"/>
          </svg>
          <span class="brand__deva">नाता</span><span class="brand__latin"><span class="brand__dot">·</span> Naata</span>
        </div>
        <div class="header__tools" id="tools"></div>
      </header>
      <div class="stage" id="stage"></div>
    </div>
    <div id="modalRoot"></div>

    <script>
      "use strict";
      /* ===== Storage ===== */
      var KEY="naata.v2";
      var persistent=(function(){try{localStorage.setItem("naata.__t","1");localStorage.removeItem("naata.__t");return true;}catch(e){return false;}})();
      var state={people:[],unions:[],meId:null};
      function load(){
        if(!persistent)return;
        try{
          var raw=localStorage.getItem(KEY);
          if(raw){var d=JSON.parse(raw);state.people=d.people||[];state.unions=d.unions||[];state.meId=d.meId||null;}
          else{var old=localStorage.getItem("naata.v1");if(old){var o=JSON.parse(old);state.people=o.people||[];}}
        }catch(e){}
      }
      function save(){if(!persistent)return;try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){if(e&&(e.name==="QuotaExceededError"||e.code===22))toast("Storage is full — remove a photo or export a backup.");}}

      /* ===== Utils ===== */
      function uid(){return (crypto&&crypto.randomUUID)?crypto.randomUUID():"id-"+Date.now()+"-"+Math.random().toString(36).slice(2);}
      function el(tag,attrs){
        var n=document.createElement(tag);attrs=attrs||{};
        for(var k in attrs){var v=attrs[k];if(v==null||v===false)continue;
          if(k==="class")n.className=v;else if(k==="html")n.innerHTML=v;else if(k==="text")n.textContent=v;
          else if(k.slice(0,2)==="on"&&typeof v==="function")n.addEventListener(k.slice(2).toLowerCase(),v);
          else n.setAttribute(k,v===true?"":v);}
        for(var i=2;i<arguments.length;i++){var kid=arguments[i];if(kid==null||kid===false)continue;
          if(Array.isArray(kid))kid.forEach(function(c){if(c!=null&&c!==false)n.appendChild(node(c));});else n.appendChild(node(kid));}
        return n;
      }
      function node(c){return typeof c==="object"?c:document.createTextNode(String(c));}
      function svgEl(tag,attrs){var n=document.createElementNS("http://www.w3.org/2000/svg",tag);for(var k in attrs)n.setAttribute(k,attrs[k]);return n;}
      var AVC=["#137a72","#d6402b","#7a5b13","#3f5fa8","#8a3fa8","#2f8a4f","#a83f6f"];
      function initials(name){var p=(name||"").trim().split(/\s+/).filter(Boolean);if(!p.length)return"?";if(p.length===1)return p[0].slice(0,2).toUpperCase();return (p[0][0]+p[p.length-1][0]).toUpperCase();}
      function colorFor(name){var h=0;for(var i=0;i<name.length;i++)h=(h*31+name.charCodeAt(i))>>>0;return AVC[h%AVC.length];}
      function avatar(p,size){
        if(p.photo)return el("img",{class:"avatar avatar--photo",src:p.photo,alt:"",draggable:"false",style:"width:"+size+"px;height:"+size+"px"});
        return el("div",{class:"avatar avatar--initials","aria-hidden":"true",style:"width:"+size+"px;height:"+size+"px;font-size:"+(size*0.38)+"px;background:"+colorFor(p.name||"?")},initials(p.name||"?"));
      }
      function ordinal(n){var s=["th","st","nd","rd"],v=n%100;return n+(s[(v-20)%10]||s[v]||s[0]);}
      function fileToAvatar(file){return new Promise(function(res,rej){
        if(!file.type||file.type.indexOf("image/")!==0){rej(new Error("Please choose an image."));return;}
        var r=new FileReader();r.onerror=function(){rej(new Error("Couldn't read that image."));};
        r.onload=function(){var img=new Image();img.onerror=function(){rej(new Error("Couldn't open that image."));};
          img.onload=function(){var M=320,s=Math.min(1,M/Math.max(img.width,img.height)),w=Math.round(img.width*s),h=Math.round(img.height*s);
            var c=document.createElement("canvas");c.width=w;c.height=h;var x=c.getContext("2d");if(!x){res(r.result);return;}x.drawImage(img,0,0,w,h);res(c.toDataURL("image/jpeg",0.72));};
          img.src=r.result;};r.readAsDataURL(file);});}
      var toastTimer;function toast(m){var o=document.querySelector(".toast");if(o)o.remove();var t=el("div",{class:"toast"},m);document.body.appendChild(t);clearTimeout(toastTimer);toastTimer=setTimeout(function(){t.remove();},3200);}

      /* ===== Graph helpers (union model) ===== */
      function personById(id){return state.people.find(function(p){return p.id===id;});}
      function unionsAsPartner(id){return state.unions.filter(function(u){return u.partners.indexOf(id)>=0;});}
      function primaryUnion(id){return unionsAsPartner(id)[0]||null;}
      function parentUnion(id){return state.unions.find(function(u){return u.children.indexOf(id)>=0;})||null;}
      function partnerOf(id){var u=primaryUnion(id);if(!u)return null;var o=u.partners.filter(function(x){return x!==id;});return o.length?personById(o[0]):null;}
      function childrenOf(id){var u=primaryUnion(id);return u?u.children.slice():[];}
      function bySibling(a,b){var pa=personById(a),pb=personById(b);var oa=pa.birthOrder==null?9999:pa.birthOrder,ob=pb.birthOrder==null?9999:pb.birthOrder;if(oa!==ob)return oa-ob;return (pa.createdAt||0)-(pb.createdAt||0);}

      /* ===== Operations ===== */
      function makePerson(draft){var now=Date.now();var p=Object.assign({},draft,{id:uid(),createdAt:now,updatedAt:now});state.people.push(p);return p;}
      function addRoot(draft){var p=makePerson(draft);save();return p;}
      function addPartner(anchorId,draft){var p=makePerson(draft);var u=primaryUnion(anchorId);
        if(u&&u.partners.length===1)u.partners.push(p.id);else state.unions.push({id:uid(),partners:[anchorId,p.id],children:[]});save();return p;}
      function addSibling(anchorId,draft){var p=makePerson(draft);var pu=parentUnion(anchorId);
        if(pu)pu.children.push(p.id);else state.unions.push({id:uid(),partners:[],children:[anchorId,p.id]});save();return p;}
      function addChild(anchorId,draft){var p=makePerson(draft);var u=primaryUnion(anchorId);
        if(u)u.children.push(p.id);else state.unions.push({id:uid(),partners:[anchorId],children:[p.id]});save();return p;}
      function updatePerson(id,draft){var i=state.people.findIndex(function(p){return p.id===id;});if(i<0)return null;state.people[i]=Object.assign({},state.people[i],draft,{updatedAt:Date.now()});save();return state.people[i];}
      function removePerson(id){
        state.people=state.people.filter(function(p){return p.id!==id;});
        if(state.meId===id)state.meId=null;
        state.unions.forEach(function(u){u.partners=u.partners.filter(function(x){return x!==id;});u.children=u.children.filter(function(x){return x!==id;});});
        state.unions=state.unions.filter(function(u){if(u.partners.length===0&&u.children.length<2)return false;return true;});
        save();
      }
      function setMe(id){state.meId=(state.meId===id?null:id);save();}

      /* ===== Backup ===== */
      function exportBackup(){var payload={app:"naata",version:2,exportedAt:new Date().toISOString(),people:state.people,unions:state.unions,meId:state.meId};
        var blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});var url=URL.createObjectURL(blob);
        var a=el("a",{href:url,download:"naata-backup-"+new Date().toISOString().slice(0,10)+".json"});document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);toast("Backup downloaded.");}
      function importBackup(file){var r=new FileReader();r.onload=function(){var d;try{d=JSON.parse(r.result);}catch(e){toast("That file isn't valid JSON.");return;}
        if(d.app!=="naata"||!Array.isArray(d.people)){toast("That isn't a Naata backup file.");return;}
        if(!confirm("Restoring replaces everyone currently in Naata on this device. Continue?"))return;
        state.people=d.people||[];state.unions=d.unions||[];state.meId=d.meId||null;save();render();toast("Restored "+state.people.length+(state.people.length===1?" person.":" people."));};r.readAsText(file);}

      /* ===== Modal ===== */
      var modalRoot=document.getElementById("modalRoot");
      function closeModal(){modalRoot.innerHTML="";document.body.style.overflow="";}
      function openSheet(title,bodyNode){
        var sheet=el("div",{class:"sheet",role:"dialog","aria-modal":"true","aria-label":title},
          el("div",{class:"sheet__head"},el("h2",{},title),el("button",{class:"sheet__close","aria-label":"Close",onclick:closeModal},"×")),
          el("div",{class:"sheet__body"},bodyNode));
        var ov=el("div",{class:"overlay",onclick:function(e){if(e.target===ov)closeModal();}},sheet);
        modalRoot.innerHTML="";modalRoot.appendChild(ov);document.body.style.overflow="hidden";
      }

      var GENDERS=[["male","Male"],["female","Female"],["other","Other"],["unknown","Not set"]];
      function labelEl(t,req){return el("span",{class:"field__label"},t,req?el("span",{class:"field__req"}," required"):null);}
      function field(label,input,err,req){return el("label",{class:"field"},labelEl(label,req),input,err||null);}

      function personForm(opts){
        var existing=opts.existing;
        var photo=existing?existing.photo:undefined,gender=existing?existing.gender:"unknown";
        var socials=existing&&existing.socials?existing.socials.map(function(s){return{label:s.label,url:s.url};}):[];
        var avatarWrap=el("div",{});
        var nameInput=el("input",{class:"input",value:existing?existing.name:"",placeholder:"Full name"});
        var nameErr=el("div",{class:"field__err",style:"display:none"},"A name is needed to save.");
        var nickInput=el("input",{class:"input",value:existing&&existing.nickname?existing.nickname:"",placeholder:"What people actually call them"});
        var orderVal=existing&&existing.birthOrder!=null?String(existing.birthOrder):(opts.suggestOrder?String(opts.suggestOrder):"");
        var orderInput=el("input",{class:"input",type:"number",min:"1",value:orderVal,placeholder:"—"});
        var phoneInput=el("input",{class:"input",inputmode:"tel",value:existing&&existing.phone?existing.phone:"",placeholder:"Optional"});
        var notesInput=el("textarea",{class:"input",rows:"3",placeholder:"Anything that helps you place them — where they live, how you met, a memory."},existing&&existing.notes?existing.notes:"");
        var pickLabel,actionsBox,removeBtn;
        function paintAvatar(){avatarWrap.innerHTML="";avatarWrap.appendChild(avatar({name:nameInput.value||"?",photo:photo},78));
          if(pickLabel&&pickLabel.firstChild)pickLabel.firstChild.nodeValue=photo?"Change photo":"Add photo";
          if(actionsBox){var ex=actionsBox.querySelector(".btn--text");if(photo&&!ex)actionsBox.appendChild(removeBtn);if(!photo&&ex)ex.remove();}}
        var fileInput=el("input",{type:"file",accept:"image/*",hidden:true,onchange:function(e){var f=e.target.files&&e.target.files[0];e.target.value="";if(!f)return;
          fileToAvatar(f).then(function(d){photo=d;paintAvatar();}).catch(function(err){toast(err.message||"Couldn't add photo.");});}});
        removeBtn=el("button",{type:"button",class:"btn btn--text btn--sm",onclick:function(){photo=undefined;paintAvatar();}},"Remove");
        pickLabel=el("label",{class:"btn btn--ghost btn--sm"},photo?"Change photo":"Add photo",fileInput);
        actionsBox=el("div",{class:"form__photo-actions"},pickLabel,photo?removeBtn:null);

        var segBtns=GENDERS.map(function(g){return el("button",{type:"button",class:gender===g[0]?"on":"",onclick:function(){gender=g[0];segBtns.forEach(function(b,i){b.className=GENDERS[i][0]===gender?"on":"";});}},g[1]);});
        var segmented=el("div",{class:"segmented",role:"group","aria-label":"Gender"},segBtns);

        var socialsWrap=el("div",{});
        function paintSocials(){socialsWrap.innerHTML="";socials.forEach(function(s,idx){socialsWrap.appendChild(el("div",{class:"social-row"},
          el("input",{class:"input",style:"max-width:116px",value:s.label,placeholder:"Label",oninput:function(e){socials[idx].label=e.target.value;}}),
          el("input",{class:"input",inputmode:"url",value:s.url,placeholder:"https://…",oninput:function(e){socials[idx].url=e.target.value;}}),
          el("button",{type:"button",class:"icon-btn","aria-label":"Remove link",onclick:function(){socials.splice(idx,1);paintSocials();}},"×")));});
          socialsWrap.appendChild(el("button",{type:"button",class:"btn btn--text btn--sm",onclick:function(){socials.push({label:"",url:""});paintSocials();}},"+ Add link"));}
        paintSocials();paintAvatar();
        nameInput.addEventListener("input",function(){if(nameInput.value.trim())nameErr.style.display="none";});

        var orderField=el("label",{class:"field field--narrow"+(opts.hotOrder?" field--hot":"")},labelEl("Birth order"),orderInput,el("div",{class:"field__help"},"1 = eldest."));

        function submit(){
          var name=nameInput.value.trim();if(!name){nameErr.style.display="block";nameInput.focus();return;}
          var cs=socials.map(function(s){return{label:(s.label||"").trim(),url:(s.url||"").trim()};}).filter(function(s){return s.url;});
          var ord=orderInput.value.trim()===""?undefined:Number(orderInput.value);
          opts.onSave({name:name,nickname:nickInput.value.trim()||undefined,gender:gender,
            birthOrder:(ord!=null&&isFinite(ord))?ord:undefined,photo:photo,phone:phoneInput.value.trim()||undefined,
            socials:cs.length?cs:undefined,notes:notesInput.value.trim()||undefined});
        }

        var actions=el("div",{class:"form__actions"},
          existing?el("button",{type:"button",class:"btn btn--danger",onclick:function(){confirmDelete(existing);}},"Delete"):null,
          el("span",{class:"spacer"}),
          el("button",{type:"button",class:"btn btn--ghost",onclick:existing?function(){openDetail(existing);}:closeModal},"Cancel"),
          el("button",{type:"button",class:"btn btn--primary",onclick:submit},existing?"Save changes":"Add"));

        var form=el("div",{class:"form"},
          el("div",{class:"form__photo"},avatarWrap,actionsBox),
          field("Name",nameInput,nameErr,true),
          field("Called / nickname",nickInput),
          el("div",{class:"row"},
            el("div",{class:"field"},labelEl("Gender"),segmented,el("div",{class:"field__help"},"Used for the right kinship term.")),
            orderField),
          field("Phone",phoneInput),
          el("div",{class:"field"},labelEl("Social links"),socialsWrap),
          field("Notes",notesInput));

        var body=el("div",{},opts.ctx?el("div",{class:"sheet__ctx"},opts.ctx):null,form,actions);
        openSheet(opts.title,body);
        setTimeout(function(){nameInput.focus();},60);
      }

      /* ===== Add flows ===== */
      function startFirst(){personForm({title:"Add the first person",
        ctx:"Start anywhere — yourself, or the eldest relative you know. You'll grow the tree out from here.",
        onSave:function(d){addRoot(d);render();closeModal();}});}
      function addAnother(){personForm({title:"Add another person",
        ctx:"This person starts a new, separate branch you can connect later.",
        onSave:function(d){addRoot(d);render();closeModal();}});}
      function openRightMenu(anchor){
        var body=el("div",{class:"choice"},
          el("button",{onclick:function(){openAdd("partner",anchor);}},el("span",{class:"choice__ic"},"♥"),
            el("span",{},el("div",{class:"choice__t"},"Partner"),el("div",{class:"choice__d"},"Spouse or partner of "+anchor.name))),
          el("button",{onclick:function(){openAdd("sibling",anchor);}},el("span",{class:"choice__ic"},"⇆"),
            el("span",{},el("div",{class:"choice__t"},"Sibling"),el("div",{class:"choice__d"},"Brother or sister — set birth order"))));
        openSheet("Add beside "+anchor.name,body);
      }
      function openAdd(mode,anchor){
        var title,ctx,suggest,hot=false;
        if(mode==="partner"){title="Add "+anchor.name+"'s partner";ctx="They'll be paired with "+anchor.name+"; children you add hang from the couple.";}
        else if(mode==="sibling"){title="Add a sibling of "+anchor.name;ctx="They share "+anchor.name+"'s parents. Set birth order so the tree shows who's older.";hot=true;
          suggest=(parentUnion(anchor.id)?parentUnion(anchor.id).children.length:1)+1;}
        else{title="Add "+anchor.name+"'s child";ctx="Set birth order so siblings line up oldest to youngest.";hot=true;
          suggest=(primaryUnion(anchor.id)?primaryUnion(anchor.id).children.length:0)+1;}
        personForm({title:title,ctx:ctx,suggestOrder:suggest,hotOrder:hot,onSave:function(d){
          if(mode==="partner")addPartner(anchor.id,d);else if(mode==="sibling")addSibling(anchor.id,d);else addChild(anchor.id,d);
          render();closeModal();}});
      }

      /* ===== Detail ===== */
      function openDetail(person){
        person=personById(person.id)||person;
        var isMe=state.meId===person.id;
        var rows=[];
        if(person.phone)rows.push(el("div",{class:"dl__row"},el("dt",{},"Phone"),el("dd",{},el("a",{href:"tel:"+person.phone},person.phone))));
        if(person.socials&&person.socials.length)rows.push(el("div",{class:"dl__row"},el("dt",{},"Links"),el("dd",{class:"dl__links"},person.socials.map(function(s){return el("a",{href:s.url,target:"_blank",rel:"noopener noreferrer"},s.label||s.url);}))));
        if(person.notes)rows.push(el("div",{class:"dl__row"},el("dt",{},"Notes"),el("dd",{class:"notes"},person.notes)));
        var body=el("div",{class:"detail"},
          el("div",{class:"detail__head"},avatar(person,86),el("div",{},el("h3",{class:"detail__name"},person.name),person.nickname?el("p",{class:"detail__nick"},"“"+person.nickname+"”"):null)),
          el("div",{class:"chips"},
            el("span",{class:"chip chip--act",onclick:function(){setMe(person.id);render();openDetail(person);}},isMe?"★ This is me":"Set as “me”"),
            person.gender!=="unknown"?el("span",{class:"chip"},({male:"Male",female:"Female",other:"Other"})[person.gender]):null,
            person.birthOrder!=null?el("span",{class:"chip"},ordinal(person.birthOrder)+" born"):null),
          rows.length?el("dl",{class:"dl"},rows):null,
          el("div",{class:"detail__actions"},
            el("button",{class:"btn btn--danger",onclick:function(){confirmDelete(person);}},"Delete"),
            el("span",{class:"spacer"}),
            el("button",{class:"btn btn--primary",onclick:function(){personForm({existing:person,title:"Edit "+person.name,onSave:function(d){var u=updatePerson(person.id,d);render();openDetail(u);}});}},"Edit")));
        openSheet(person.name,body);
      }
      function confirmDelete(person){if(!confirm("Remove "+person.name+" from Naata? This also unlinks them from the tree and can't be undone."))return;removePerson(person.id);closeModal();render();}

      /* ===== Layout ===== */
      var CARD_W=128,CARD_H=132,GAP_COUPLE=26,GAP_X=30,GAP_Y=60;
      function coupleWidth(id){return partnerOf(id)?2*CARD_W+GAP_COUPLE:CARD_W;}
      function computeLayout(){
        var pos={},couples=[],sibGroups=[],cursor=0;
        function place(id,depth){
          var partner=partnerOf(id),cw=coupleWidth(id);
          var kids=childrenOf(id).slice().sort(bySibling),left;
          if(kids.length===0){left=cursor;cursor+=cw+GAP_X;}
          else{var centers=kids.map(function(k){return place(k,depth+1);});
            var mid=(centers[0]+centers[centers.length-1])/2;left=mid-cw/2;cursor=Math.max(cursor,left+cw+GAP_X);}
          var y=depth*(CARD_H+GAP_Y);pos[id]={x:left,y:y};
          var partnerId=null;if(partner){pos[partner.id]={x:left+CARD_W+GAP_COUPLE,y:y};partnerId=partner.id;}
          couples.push({center:left+cw/2,top:y,bottom:y+CARD_H,childIds:kids,ids:partnerId?[id,partnerId]:[id],y:y});
          return left+cw/2;
        }
        var placed={};
        state.unions.forEach(function(u){if(u.partners.length===0&&u.children.length>=1){
          var kids=u.children.slice().sort(bySibling);var centers=kids.map(function(k){return place(k,0);});
          kids.forEach(function(k){placed[k]=1;});sibGroups.push({centers:centers,childIds:kids});cursor+=GAP_X;}});
        state.people.forEach(function(p){
          if(placed[p.id]||pos[p.id])return;
          if(parentUnion(p.id))return;
          place(p.id,0);placed[p.id]=1;var pa=partnerOf(p.id);if(pa)placed[pa.id]=1;cursor+=GAP_X;});
        var minX=Infinity,maxX=-Infinity,maxY=-Infinity;
        for(var id in pos){minX=Math.min(minX,pos[id].x);maxX=Math.max(maxX,pos[id].x+CARD_W);maxY=Math.max(maxY,pos[id].y+CARD_H);}
        if(!isFinite(minX)){minX=0;maxX=0;maxY=0;}
        var PAD=40,offX=PAD-minX,offY=PAD;
        for(var id2 in pos){pos[id2].x+=offX;pos[id2].y+=offY;}
        couples.forEach(function(c){c.center+=offX;c.top+=offY;c.bottom+=offY;c.y+=offY;});
        sibGroups.forEach(function(g){g.centers=g.centers.map(function(c){return c+offX;});});
        return {pos:pos,couples:couples,sibGroups:sibGroups,width:Math.max(maxX-minX+PAD*2,1),height:maxY+PAD*2};
      }

      /* ===== Render ===== */
      function line(svg,x1,y1,x2,y2){
        var d="M"+x1+" "+y1+(x1===x2?(" V"+y2):(y1===y2?(" H"+x2):(" L"+x2+" "+y2)));
        svg.appendChild(svgEl("path",{d:d,stroke:"#cdc6bb","stroke-width":"2",fill:"none","stroke-linecap":"round"}));
      }
      function render(){
        var stage=document.getElementById("stage");stage.innerHTML="";renderTools();
        if(!persistent)stage.appendChild(el("div",{class:"preview-note"},el("span",{},el("b",{},"Preview mode. "),"Changes save once Naata is on your phone.")));
        if(!state.people.length){
          stage.appendChild(el("div",{class:"empty"},
            el("button",{class:"bigplus","aria-label":"Add first person",onclick:startFirst},"+"),
            el("h1",{},"Start your family tree"),
            el("p",{},"Tap the plus to add the first person. Then grow it: a partner or sibling to the side, children below."),
            el("p",{class:"empty__hint"},"Everything stays on this device. Nothing is uploaded.")));
          return;
        }
        var L=computeLayout();
        var canvas=el("div",{class:"canvas",style:"width:"+L.width+"px;height:"+L.height+"px"});
        var svg=svgEl("svg",{class:"links",width:L.width,height:L.height});canvas.appendChild(svg);
        L.couples.forEach(function(c){
          if(c.ids.length===2)line(svg,L.pos[c.ids[0]].x+CARD_W,c.top+CARD_H/2,L.pos[c.ids[1]].x,c.top+CARD_H/2);
          if(c.childIds.length){var barY=c.bottom+GAP_Y/2;line(svg,c.center,c.bottom,c.center,barY);
            var cs=c.childIds.map(function(k){return L.pos[k].x+CARD_W/2;});
            line(svg,Math.min.apply(null,cs),barY,Math.max.apply(null,cs),barY);
            c.childIds.forEach(function(k){line(svg,L.pos[k].x+CARD_W/2,barY,L.pos[k].x+CARD_W/2,L.pos[k].y);});}
        });
        L.sibGroups.forEach(function(g){var topY=Math.min.apply(null,g.childIds.map(function(k){return L.pos[k].y;}));
          var barY=topY-GAP_Y/2;if(barY<10)barY=10;
          line(svg,Math.min.apply(null,g.centers),barY,Math.max.apply(null,g.centers),barY);
          g.childIds.forEach(function(k){line(svg,L.pos[k].x+CARD_W/2,barY,L.pos[k].x+CARD_W/2,L.pos[k].y);});});
        state.people.forEach(function(p){
          var pp=L.pos[p.id];if(!pp)return;var isMe=state.meId===p.id;
          var card=el("button",{class:"tcard"+(isMe?" is-me":""),onclick:function(){openDetail(p);}},
            avatar(p,46),isMe?el("span",{class:"me-badge"},"ME"):null,
            el("span",{class:"tcard__name"},p.name),p.nickname?el("span",{class:"tcard__sub"},"“"+p.nickname+"”"):null);
          var right=el("button",{class:"plus plus--right","aria-label":"Add partner or sibling",onclick:function(e){e.stopPropagation();openRightMenu(p);}},"+");
          var bottom=el("button",{class:"plus plus--bottom","aria-label":"Add child",onclick:function(e){e.stopPropagation();openAdd("child",p);}},"+");
          canvas.appendChild(el("div",{class:"node",style:"left:"+pp.x+"px;top:"+pp.y+"px"},card,right,bottom));
        });
        stage.appendChild(canvas);
      }
      function renderTools(){
        var tools=document.getElementById("tools");tools.innerHTML="";if(!state.people.length)return;
        var fileInput=el("input",{type:"file",accept:"application/json,.json",hidden:true,onchange:function(e){var f=e.target.files&&e.target.files[0];e.target.value="";if(f)importBackup(f);}});
        tools.appendChild(el("button",{class:"btn btn--ghost btn--sm",onclick:addAnother},"+ Person"));
        tools.appendChild(el("button",{class:"btn btn--ghost btn--sm",onclick:exportBackup},"Export"));
        tools.appendChild(el("button",{class:"btn btn--ghost btn--sm",onclick:function(){fileInput.click();}},"Import"));
        tools.appendChild(fileInput);
      }

      document.addEventListener("keydown",function(e){if(e.key==="Escape")closeModal();});
      load();render();
    </script>
  </body>
</html>
